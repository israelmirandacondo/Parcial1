<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Activos Fijos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
        }

        .header {
            background-color: #003087;
            color: white;
            padding: 10px;
            text-align: center;
            font-weight: bold;
        }

        .subheader {
            background-color: #0055cc;
            color: white;
            padding: 8px;
            text-align: center;
            font-size: 18px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            background-color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        th {
            background-color: #003087;
            color: white;
            padding: 10px;
            text-align: left;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background-color: #f5f5f5;
        }

        .selected {
            background-color: #b3d9ff !important;
        }

        .buttons {
            margin-top: 15px;
            text-align: center;
        }

        button {
            background-color: #003087;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            background-color: #0055cc;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background-color: white;
            padding: 10px;
            border: 1px solid #ccc;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Encabezado principal -->
        <div class="header">
            SISTEMA DE ACTIVOS FIJOS
        </div>

        <!-- Subtítulo -->
        <div class="subheader">
            ADMINISTRACION UNIDAD ADMINISTRATIVA
        </div>

        <!-- Tabla -->
        <table>
            <thead>
                <tr>
                    <th>UNIDAD</th>
                    <th>DESCRIPCION</th>
                    <th>CIUDAD</th>
                </tr>
            </thead>
            <tbody>
                <tr class="selected">
                    <td>025</td>
                    <td>GACETA OFICIAL DE BOLIVIA</td>
                    <td>LA PAZ</td>
                </tr>
                <!-- Puedes agregar más filas aquí si quieres -->
            </tbody>
        </table>

        <!-- Botones -->
        <div class="buttons">
            <button onclick="alert('Nuevo registro')">Nuevo</button>
            <button onclick="alert('Editar registro')">Editar</button>
            <button onclick="alert('Eliminar registro')">Eliminar</button>
            <button onclick="alert('Registro seleccionado')">Seleccionar</button>
            <button onclick="alert('Saliendo del sistema...')">Salir</button>
        </div>
    </div>

</body>
</html>
